<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- מעטפה -->
    <div class="container">

        <div id="envelope" class="envelope">
            <div class="letter">
                <h2>יש לנו משהו לספר לכם</h2>
                <p>לחצו כדי לפתוח את ההזמנה</p>
            </div>

            <div class="flap"></div>
        </div>

    </div>

    <!-- הזמנה -->
    <div id="invitation" class="invitation hidden">

        <section class="hero">
            <h1>נועה & אלעד</h1>
            <p class="date">12.09.2026</p>
        </section>

        <section class="details">
            <p>מתרגשים להזמין אתכם לחגוג איתנו</p>

            <div class="box">
                <p><strong>קבלת פנים:</strong> 19:30</p>
                <p><strong>חופה:</strong> 20:30</p>
                <p><strong>מיקום:</strong> גן האירועים קדם</p>
            </div>

            <a href="https://maps.google.com" target="_blank" class="btn">
                ניווט למקום
            </a>

            <a href="https://wa.me/972500000000" target="_blank" class="btn secondary">
                אישור הגעה
            </a>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
